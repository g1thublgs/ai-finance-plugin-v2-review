<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 财务插件后台管理</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: #1f2937;
      background: #f5f7fb;
    }
    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 { margin: 0; font-size: 18px; font-weight: 700; }
    main { padding: 18px 24px 32px; }
    .grid {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-head {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid #eef0f4;
    }
    .panel-title { font-size: 15px; font-weight: 700; }
    .muted { color: #6b7280; font-size: 12px; }
    button {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
    }
    button.primary {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #eef0f4;
    }
    .table-wrap { overflow: auto; max-height: calc(100vh - 184px); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #ffffff;
    }
    th, td {
      border-bottom: 1px solid #eef0f4;
      padding: 9px 10px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }
    th {
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    input, select {
      width: 100%;
      min-width: 76px;
      border: 1px solid #d7dce5;
      border-radius: 6px;
      padding: 6px 8px;
      font: inherit;
      background: #ffffff;
    }
    input.short { width: 82px; }
    .rule-row.off { color: #9ca3af; background: #fafafa; }
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      min-height: 18px;
      font-size: 12px;
      color: #2563eb;
    }
    .tabs { display: flex; gap: 8px; }
    .tab.active { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI 财务插件后台管理</h1>
    <div id="status" class="status"></div>
  </header>
  <main>
    <div class="grid">
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">差旅费指标规则</div>
            <div class="muted">启用状态会影响下一次预审/事中审核</div>
          </div>
          <button id="reloadRules">刷新</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>启用</th>
                <th>规则编号</th>
                <th>规则名称</th>
                <th>等级</th>
              </tr>
            </thead>
            <tbody id="ruleBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">差旅住宿与补助标准</div>
            <div class="muted">基础标准与旺季标准均按“更具体地区优先”匹配</div>
          </div>
          <button id="saveStandards" class="primary">保存标准</button>
        </div>
        <div class="toolbar">
          <div class="tabs">
            <button id="baseTab" class="tab active">基础标准</button>
            <button id="seasonTab" class="tab">旺季标准</button>
          </div>
          <button id="addRow">新增一行</button>
          <span class="muted">住宿标准：部级、司局级、其他人员；伙食补助：元/人·天</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="standardHead"></thead>
            <tbody id="standardBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    let standards = null;
    let standardMode = 'baseRows';

    function setStatus(text) {
      document.getElementById('status').textContent = text || '';
    }

    async function api(url, options) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      const json = await response.json();
      if (!json.success) throw new Error(json.message || '请求失败');
      return json;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[ch]));
    }

    async function loadRules() {
      setStatus('正在读取规则...');
      const result = await api('/api/admin/rules');
      const body = document.getElementById('ruleBody');
      body.innerHTML = result.data.map(rule => `
        <tr class="rule-row ${rule.enabled ? '' : 'off'}">
          <td>
            <label class="switch">
              <input type="checkbox" ${rule.enabled ? 'checked' : ''} data-rule="${escapeHtml(rule.fileName)}">
            </label>
          </td>
          <td>${escapeHtml(rule.ruleId || rule.fileName)}</td>
          <td title="${escapeHtml(rule.fileName)}">${escapeHtml(rule.ruleName)}</td>
          <td>${escapeHtml(rule.promptLevel)}</td>
        </tr>
      `).join('');
      body.querySelectorAll('input[type="checkbox"]').forEach(input => {
        input.addEventListener('change', async () => {
          setStatus('正在保存规则状态...');
          await api(`/api/admin/rules/${encodeURIComponent(input.dataset.rule)}/enabled`, {
            method: 'POST',
            body: JSON.stringify({ enabled: input.checked }),
          });
          await loadRules();
          setStatus('规则状态已保存');
        });
      });
      setStatus('规则已加载');
    }

    function standardColumns() {
      const common = [
        ['province', '地区'],
        ['area', '城市/范围'],
        ['ministerial', '部级'],
        ['bureau', '司局级'],
        ['other', '其他人员'],
        ['meal', '伙食补助'],
        ['enabled', '启用'],
      ];
      if (standardMode === 'seasonRows') {
        return [
          ['province', '地区'],
          ['area', '旺季地区'],
          ['season', '旺季期间'],
          ['ministerial', '部级'],
          ['bureau', '司局级'],
          ['other', '其他人员'],
          ['meal', '伙食补助'],
          ['enabled', '启用'],
        ];
      }
      return common;
    }

    function rowValue(row, key) {
      if (key === 'ministerial' || key === 'bureau' || key === 'other') return row.lodging?.[key] ?? '';
      if (key === 'enabled') return row.enabled !== false;
      return row[key] ?? '';
    }

    function renderStandards() {
      const rows = standards?.[standardMode] || [];
      const columns = standardColumns();
      document.getElementById('baseTab').classList.toggle('active', standardMode === 'baseRows');
      document.getElementById('seasonTab').classList.toggle('active', standardMode === 'seasonRows');
      document.getElementById('standardHead').innerHTML = `<tr>${columns.map(([, label]) => `<th>${label}</th>`).join('')}<th>操作</th></tr>`;
      document.getElementById('standardBody').innerHTML = rows.map((row, rowIndex) => `
        <tr data-index="${rowIndex}">
          ${columns.map(([key]) => {
            if (key === 'enabled') {
              return `<td><input type="checkbox" data-key="${key}" ${rowValue(row, key) ? 'checked' : ''}></td>`;
            }
            const short = ['ministerial', 'bureau', 'other', 'meal'].includes(key) ? ' short' : '';
            return `<td><input class="${short}" data-key="${key}" value="${escapeHtml(rowValue(row, key))}"></td>`;
          }).join('')}
          <td><button data-remove="${rowIndex}">删除</button></td>
        </tr>
      `).join('');
      document.querySelectorAll('[data-remove]').forEach(button => {
        button.addEventListener('click', () => {
          standards[standardMode].splice(Number(button.dataset.remove), 1);
          renderStandards();
        });
      });
    }

    function syncStandardsFromTable() {
      const rows = [];
      document.querySelectorAll('#standardBody tr').forEach(tr => {
        const row = { lodging: {} };
        tr.querySelectorAll('[data-key]').forEach(input => {
          const key = input.dataset.key;
          const value = input.type === 'checkbox' ? input.checked : input.value.trim();
          if (['ministerial', 'bureau', 'other'].includes(key)) row.lodging[key] = Number(value || 0);
          else if (key === 'meal') row.meal = Number(value || 0);
          else row[key] = value;
        });
        rows.push(row);
      });
      standards[standardMode] = rows;
    }

    async function loadStandards() {
      setStatus('正在读取标准...');
      const result = await api('/api/admin/travel-standards');
      standards = result.data;
      renderStandards();
      setStatus('标准已加载');
    }

    document.getElementById('reloadRules').addEventListener('click', loadRules);
    document.getElementById('baseTab').addEventListener('click', () => {
      syncStandardsFromTable();
      standardMode = 'baseRows';
      renderStandards();
    });
    document.getElementById('seasonTab').addEventListener('click', () => {
      syncStandardsFromTable();
      standardMode = 'seasonRows';
      renderStandards();
    });
    document.getElementById('addRow').addEventListener('click', () => {
      syncStandardsFromTable();
      const row = { province: '', area: '', lodging: { ministerial: 0, bureau: 0, other: 0 }, meal: 100, enabled: true };
      if (standardMode === 'seasonRows') row.season = '';
      standards[standardMode].push(row);
      renderStandards();
    });
    document.getElementById('saveStandards').addEventListener('click', async () => {
      syncStandardsFromTable();
      setStatus('正在保存标准...');
      const saved = await api('/api/admin/travel-standards', {
        method: 'POST',
        body: JSON.stringify(standards),
      });
      standards = saved.data;
      renderStandards();
      setStatus('标准已保存');
    });

    Promise.all([loadRules(), loadStandards()]).catch(error => setStatus(error.message));
  </script>
</body>
</html>
